services:
  # Backend Service
  - type: web
    name: shelter-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        value: mongodb+srv://useruser:IlfXW3TQLASjLZv8@clustern.reruo2j.mongodb.net/shelter_db?retryWrites=true&w=majority
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health

  # Frontend Service
  - type: web
    name: shelter-frontend
    env: static
    rootDir: my-app
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://shelter-backend.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://shelter-backend.onrender.com/api/*
